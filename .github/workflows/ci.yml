name: GoalCraft AI — CI / QA Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  APP_PORT: "8899"

jobs:
  # ── Stage 1: Lint + Unit Self-check ──────────────────────────────
  lint-and-selfcheck:
    name: "🔍 Lint & Self-check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend_project
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r ../requirements.txt

      - name: Python syntax check (compile)
        run: python -m py_compile app/main.py

      - name: FastAPI self-check (TestClient smoke)
        run: |
          python -c "
          from fastapi.testclient import TestClient
          from app.main import app
          c = TestClient(app)
          r = c.get('/health')
          assert r.status_code == 200, f'Health failed: {r.text}'
          print('Self-check passed')
          "

  # ── Stage 2: API Contract Tests (15 tests) ──────────────────────
  contract-tests:
    name: "📋 API Contract Tests (15)"
    runs-on: ubuntu-latest
    needs: lint-and-selfcheck
    defaults:
      run:
        working-directory: backend_project
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r ../requirements.txt

      - name: Start API server
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port ${{ env.APP_PORT }} &
          sleep 3

      - name: Run contract tests
        run: python qa/run_api_contract_tests.py
        env:
          BASE_URL: "http://localhost:${{ env.APP_PORT }}"

      - name: Upload contract test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-test-report
          path: backend_project/qa/test_report.json

  # ── Stage 3: Comprehensive QA (61 tests, synthetic §4.2 data) ───
  comprehensive-qa:
    name: "🧪 Comprehensive QA (61 tests)"
    runs-on: ubuntu-latest
    needs: contract-tests
    defaults:
      run:
        working-directory: backend_project
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r ../requirements.txt

      - name: Generate synthetic §4.2 database
        run: python qa/generate_synthetic_db.py
        timeout-minutes: 2

      - name: Verify synthetic dump exists
        run: |
          ls -lh qa/fixtures/synthetic_dump.json
          python -c "
          import json, pathlib
          d = json.loads(pathlib.Path('qa/fixtures/synthetic_dump.json').read_text(encoding='utf-8'))
          total = sum(len(v) for v in d.values())
          print(f'Tables: {len(d)}, Total records: {total:,}')
          assert total >= 40000, f'Too few records: {total}'
          "

      - name: Start API server
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port ${{ env.APP_PORT }} &
          sleep 3

      - name: Run comprehensive QA suite
        run: python qa/run_comprehensive_tests.py
        env:
          BASE_URL: "http://localhost:${{ env.APP_PORT }}"
        timeout-minutes: 5

      - name: Upload QA reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: comprehensive-qa-reports
          path: |
            backend_project/qa/comprehensive_test_report.json
            backend_project/qa/comprehensive_test_report.md

  # ── Stage 4: Docker build verification ───────────────────────────
  docker-build:
    name: "🐳 Docker Build Check"
    runs-on: ubuntu-latest
    needs: lint-and-selfcheck
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t goalcraft-ai:ci -f backend_project/Dockerfile .

      - name: Smoke test Docker container
        run: |
          docker run -d --name goalcraft-ci -p 8000:8000 goalcraft-ai:ci
          sleep 5
          curl -sf http://localhost:8000/health | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['status'] == 'ok', f'Bad status: {d}'
          print('✅ Docker health OK')
          "
          docker stop goalcraft-ci

  # ── Stage 5: Summary Gate ────────────────────────────────────────
  qa-gate:
    name: "🏁 QA Gate — All Passed"
    runs-on: ubuntu-latest
    needs: [contract-tests, comprehensive-qa, docker-build]
    steps:
      - name: All checks passed
        run: echo "✅ All CI/QA stages passed — ready to merge/deploy"
