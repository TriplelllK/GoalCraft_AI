services:
  api:
    build: .
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - qdrant
    volumes:
      - ./data:/app/data  # Place organizer's .sql dump here
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: hr_goal_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data:/data                                          # Dump files accessible inside container
      - ./scripts/init_db.sh:/docker-entrypoint-initdb.d/01_restore.sh  # Auto-restore PGDMP dump
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:
